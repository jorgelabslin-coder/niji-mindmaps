{% extends "base.html" %}
{% block title %}Buscar — Niji Mindmaps{% endblock %}
{% block content %}
<div class="hero" style="padding:2rem 0 1rem;">
<h1 style="font-size:clamp(1.5rem,3vw,2rem);">Buscar</h1>
<p>Encuentra mapas mentales por tema, categoría o fecha</p>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Buscar mapas mentales..." oninput="doSearch(this.value)">
</div>
<div id="results"></div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
let fuse = null;
let allMaps = [];

async function loadIndex() {
try {
const resp = await fetch('{{ root_path }}mindmaps/index.json');
if (!resp.ok) throw new Error('Not found');
allMaps = await resp.json();
fuse = new Fuse(allMaps, { keys: ['title', 'description', 'category', 'tags'], threshold: 0.4 });
} catch(e) {
document.getElementById('results').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:2rem;">Índice de búsqueda no disponible.</p>';
}
}

function doSearch(q) {
const el = document.getElementById('results');
if (!q || !fuse) { el.innerHTML = ''; return; }
const results = fuse.search(q).slice(0, 30);
if (results.length === 0) {
el.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:2rem;">Sin resultados.</p>';
return;
}
el.innerHTML = '<div class="card-grid">' + results.map(r => `
<a href="{{ root_path }}mindmap/${r.item.id}.html" class="glass-card" style="text-decoration:none;">
<h3>${r.item.title}</h3>
<div class="meta">${r.item.date} · <span class="cat-badge cat-${r.item.category}">${r.item.category}</span></div>
</a>
`).join('') + '</div>';
}

loadIndex();
</script>
{% endblock %}
