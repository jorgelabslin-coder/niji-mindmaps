categories:
  - id: basic-greetings
    label: "Saludos Básicos"
    items:
      - expression: "おはようございます"
        reading: "おはようございます"
        meaning: "Buenos días"
        usage: "Formal, hasta ~11am"
      - expression: "こんにちは"
        reading: "こんにちは"
        meaning: "Buenas tardes / Hola"
        usage: "Desde ~11am hasta el atardecer"
      - expression: "こんばんは"
        reading: "こんばんは"
        meaning: "Buenas noches"
        usage: "Desde el atardecer"
      - expression: "さようなら"
        reading: "さようなら"
        meaning: "Adiós"
        usage: "Despedida formal, por largos períodos"
      - expression: "また明日"
        reading: "またあした"
        meaning: "Hasta mañana"
        usage: "Informal, entre amigos/compañeros"
      - expression: "じゃね"
        reading: "じゃね"
        meaning: "Nos vemos"
        usage: "Muy casual, entre amigos cercanos"
      - expression: "お元気ですか"
        reading: "おげんきですか"
        meaning: "¿Cómo está(s)?"
        usage: "Formal o semiformal"

  - id: politeness
    label: "Expresiones de Cortesía"
    items:
      - expression: "ありがとうございます"
        reading: "ありがとうございます"
        meaning: "Muchas gracias"
        usage: "Formal, para agradecer"
      - expression: "ありがとう"
        reading: "ありがとう"
        meaning: "Gracias"
        usage: "Informal, entre amigos"
      - expression: "どういたしまして"
        reading: "どういたしまして"
        meaning: "De nada"
        usage: "Respuesta a gracias"
      - expression: "すみません"
        reading: "すみません"
        meaning: "Disculpe / Lo siento"
        usage: "Multiuso: disculpa, gracias (en restaurantes)"
      - expression: "ごめんなさい"
        reading: "ごめんなさい"
        meaning: "Lo siento (disculpa)"
        usage: "Para disculparse formalmente"
      - expression: "ごめん"
        reading: "ごめん"
        meaning: "Perdón (casual)"
        usage: "Entre amigos y familia"
      - expression: "お願いします"
        reading: "おねがいします"
        meaning: "Por favor"
        usage: "Para pedir algo educadamente"
      - expression: "下さい"
        reading: "ください"
        meaning: "Deme / Por favor (imperativo)"
        usage: "Para pedir objetos, más directo que お願いします"

  - id: restaurant
    label: "En el Restaurante"
    items:
      - expression: "メニューを見せてください"
        reading: "メニューをみせてください"
        meaning: "Muéstreme el menú, por favor"
        usage: "Al sentarse en un restaurante"
      - expression: "注文してもいいですか"
        reading: "ちゅうもんしてもいいですか"
        meaning: "¿Puedo ordenar?"
        usage: "Para llamar al mesero"
      - expression: "これをください"
        reading: "これをください"
        meaning: "Esto, por favor"
        usage: "Señalando algo en el menú"
      - expression: "お会計お願いします"
        reading: "おかいけいおねがいします"
        meaning: "La cuenta, por favor"
        usage: "Para pedir la cuenta"
      - expression: "ごちそうさまでした"
        reading: "ごちそうさまでした"
        meaning: "Gracias por la comida"
        usage: "Después de terminar de comer"
      - expression: "おいしいです"
        reading: "おいしいです"
        meaning: "Está delicioso"
        usage: "Para halagar la comida"
      - expression: "いただきます"
        reading: "いただきます"
        meaning: "Buen provecho"
        usage: "Antes de empezar a comer"

  - id: shopping
    label: "Compras"
    items:
      - expression: "いくらですか"
        reading: "いくらですか"
        meaning: "¿Cuánto cuesta?"
        usage: "Para preguntar el precio"
      - expression: "これ、試着してもいいですか"
        reading: "これ、しちゃくしてもいいですか"
        meaning: "¿Puedo probarme esto?"
        usage: "En tiendas de ropa"
      - expression: "サイズはありますか"
        reading: "サイズはありますか"
        meaning: "¿Tienen mi talla?"
        usage: "Para preguntar por talla/disponibilidad"
      - expression: "もう少し安くなりませんか"
        reading: "もうすこしやすくなりませんか"
        meaning: "¿Puede ser un poco más barato?"
        usage: "Para regatear (en mercados)"
      - expression: "これにします"
        reading: "これにします"
        meaning: "Me llevo esto"
        usage: "Para decidir la compra"
      - expression: "レシートをください"
        reading: "レシートをください"
        meaning: "El recibo, por favor"
        usage: "Para pedir el ticket de compra"

  - id: directions
    label: "Direcciones y Transporte"
    items:
      - expression: "ここはどこですか"
        reading: "ここはどこですか"
        meaning: "¿Dónde estamos?"
        usage: "Cuando estás perdido"
      - expression: "駅はどこですか"
        reading: "えきはどこですか"
        meaning: "¿Dónde está la estación?"
        usage: "Para preguntar por una ubicación"
      - expression: "まっすぐ行ってください"
        reading: "まっすぐいってください"
        meaning: "Siga recto, por favor"
        usage: "Indicación de dirección"
      - expression: "右に曲がってください"
        reading: "みぎにまがってください"
        meaning: "Gire a la derecha"
        usage: "Indicación de giro"
      - expression: "左に曲がってください"
        reading: "ひだりにまがってください"
        meaning: "Gire a la izquierda"
        usage: "Indicación de giro"
      - expression: "どのくらいかかりますか"
        reading: "どのくらいかかりますか"
        meaning: "¿Cuánto tiempo toma?"
        usage: "Preguntar por duración"
      - expression: "ここから遠いですか"
        reading: "ここからとおいですか"
        meaning: "¿Está lejos de aquí?"
        usage: "Preguntar por distancia"

  - id: emergencies
    label: "Emergencias y Salud"
    items:
      - expression: "助けてください"
        reading: "たすけてください"
        meaning: "Ayúdeme, por favor"
        usage: "En caso de emergencia"
      - expression: "救急車を呼んでください"
        reading: "きゅうきゅうしゃをよんでください"
        meaning: "Llame a una ambulancia"
        usage: "Emergencia médica"
      - expression: "病院はどこですか"
        reading: "びょういんはどこですか"
        meaning: "¿Dónde está el hospital?"
        usage: "Para buscar atención médica"
      - expression: "気分が悪いです"
        reading: "きぶんがわるいです"
        meaning: "Me siento mal"
        usage: "Cuando te sientes enfermo"
      - expression: "お腹が痛いです"
        reading: "おなががいたいです"
        meaning: "Me duele el estómago"
        usage: "Describir dolor específico"
      - expression: "薬はありますか"
        reading: "くすりはありますか"
        meaning: "¿Tienen medicina?"
        usage: "En farmacia"
      - expression: "日本語がわかりません"
        reading: "にほんごがわかりません"
        meaning: "No entiendo japonés"
        usage: "Barrera del idioma"

  - id: casual
    label: "Expresiones Casuales"
    items:
      - expression: "やばい"
        reading: "やばい"
        meaning: "Genial / Qué locura / (depende contexto)"
        usage: "Jerga juvenil versátil: bueno o malo según tono"
      - expression: "すごい"
        reading: "すごい"
        meaning: "Increíble / Genial"
        usage: "Para expresar admiración o sorpresa"
      - expression: "まじで"
        reading: "まじで"
        meaning: "¿En serio? / De verdad"
        usage: "Casual, entre jóvenes"
      - expression: "なるほど"
        reading: "なるほど"
        meaning: "Ya veo / Tiene sentido"
        usage: "Al entender algo nuevo"
      - expression: "そうですね"
        reading: "そうですね"
        meaning: "Así es / Déjame pensar..."
        usage: "Afirmación suave o pausa para pensar"
      - expression: "やっぱり"
        reading: "やっぱり"
        meaning: "Como pensaba / Después de todo"
        usage: "Cuando se confirma una sospecha"
      - expression: "お疲れ様です"
        reading: "おつかれさまです"
        meaning: "Gracias por tu trabajo"
        usage: "Saludo laboral, al llegar/salir del trabajo"
