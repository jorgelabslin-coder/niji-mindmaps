themes:
  - id: colors
    label: "Colores"
    items:
      - japanese: "赤"
        reading: "あか"
        meaning: "rojo"
        example: "赤い花 (あかいはな, flor roja)"
      - japanese: "青"
        reading: "あお"
        meaning: "azul/verde"
        example: "青い空 (あおいそら, cielo azul)"
      - japanese: "黄色"
        reading: "きいろ"
        meaning: "amarillo"
        example: "黄色い鳥 (きいりとり, pájaro amarillo)"
      - japanese: "白"
        reading: "しろ"
        meaning: "blanco"
        example: "白い雪 (しろいゆき, nieve blanca)"
      - japanese: "黒"
        reading: "くろ"
        meaning: "negro"
        example: "黒い猫 (くろいねこ, gato negro)"
      - japanese: "緑"
        reading: "みどり"
        meaning: "verde"
        example: "緑の葉 (みどりのは, hoja verde)"
      - japanese: "紫"
        reading: "むらさき"
        meaning: "púrpura"
        example: "紫の花 (むらさきのはな, flor púrpura)"
      - japanese: "茶色"
        reading: "ちゃいろ"
        meaning: "marrón"
        example: "茶色の机 (ちゃいろのつくえ, escritorio marrón)"
      - japanese: "ピンク"
        reading: "ピンク"
        meaning: "rosa"
        example: "ピンクの服 (ピンクのふく, ropa rosa)"
      - japanese: "オレンジ"
        reading: "オレンジ"
        meaning: "naranja"
        example: "オレンジのジュース (jugo de naranja)"

  - id: animals
    label: "Animales"
    items:
      - japanese: "犬"
        reading: "いぬ"
        meaning: "perro"
        example: "犬が好きです (いぬがすきです, me gustan los perros)"
      - japanese: "猫"
        reading: "ねこ"
        meaning: "gato"
        example: "猫を飼っています (ねこをかっています, tengo un gato)"
      - japanese: "鳥"
        reading: "とり"
        meaning: "pájaro"
        example: "鳥が鳴いています (とりがないています, el pájaro canta)"
      - japanese: "魚"
        reading: "さかな"
        meaning: "pescado"
        example: "魚を食べます (さかなをたべます, como pescado)"
      - japanese: "馬"
        reading: "うま"
        meaning: "caballo"
        example: "馬に乗ります (うまにのります, montar a caballo)"
      - japanese: "牛"
        reading: "うし"
        meaning: "vaca"
        example: "牛乳 (ぎゅうにゅう, leche de vaca)"
      - japanese: "クマ"
        reading: "くま"
        meaning: "oso"
        example: "クマのぬいぐるみ (oso de peluche)"
      - japanese: "ウサギ"
        reading: "うさぎ"
        meaning: "conejo"
        example: "ウサギが跳ぶ (うさぎがとぶ, el conejo salta)"
      - japanese: "カメ"
        reading: "かめ"
        meaning: "tortuga"
        example: "カメは遅い (かめはおそい, la tortuga es lenta)"
      - japanese: "サル"
        reading: "さる"
        meaning: "mono"
        example: "サルが木に登る (さるがきにのぼる, el mono sube al árbol)"

  - id: food
    label: "Comida y Bebida"
    items:
      - japanese: "ご飯"
        reading: "ごはん"
        meaning: "arroz, comida"
        example: "ご飯を食べる (ごはんをたべる, comer arroz)"
      - japanese: "パン"
        reading: "パン"
        meaning: "pan"
        example: "パンを買う (パンをかう, comprar pan)"
      - japanese: "肉"
        reading: "にく"
        meaning: "carne"
        example: "肉が好き (にくがすき, me gusta la carne)"
      - japanese: "野菜"
        reading: "やさい"
        meaning: "verdura"
        example: "野菜を食べる (やさいをたべる, comer verduras)"
      - japanese: "果物"
        reading: "くだもの"
        meaning: "fruta"
        example: "果物が美味しい (くだものがおいしい, la fruta es deliciosa)"
      - japanese: "水"
        reading: "みず"
        meaning: "agua"
        example: "水を飲む (みずをのむ, beber agua)"
      - japanese: "お茶"
        reading: "おちゃ"
        meaning: "té"
        example: "お茶を飲みます (おちゃをのみます, tomar té)"
      - japanese: "コーヒー"
        reading: "コーヒー"
        meaning: "café"
        example: "コーヒーをください (café por favor)"
      - japanese: "お酒"
        reading: "おさけ"
        meaning: "alcohol/sake"
        example: "お酒を飲む (おさけをのむ, beber alcohol)"
      - japanese: "寿司"
        reading: "すし"
        meaning: "sushi"
        example: "寿司を食べたい (すしをたべたい, quiero comer sushi)"

  - id: family
    label: "Familia"
    items:
      - japanese: "お父さん"
        reading: "おとうさん"
        meaning: "papá"
        example: "お父さんは医者です (おとうさんはいしゃです, mi papá es médico)"
      - japanese: "お母さん"
        reading: "おかあさん"
        meaning: "mamá"
        example: "お母さんが料理する (おかあさんがりょうりする, mamá cocina)"
      - japanese: "兄"
        reading: "あに"
        meaning: "hermano mayor"
        example: "兄は大学生です (あにはだいがくせいです, mi hermano es universitario)"
      - japanese: "姉"
        reading: "あね"
        meaning: "hermana mayor"
        example: "姉と買い物に行く (あねとかいにものにいく, ir de compras con mi hermana)"
      - japanese: "弟"
        reading: "おとうと"
        meaning: "hermano menor"
        example: "弟が生まれた (おとうとがうまれた, nació mi hermanito)"
      - japanese: "妹"
        reading: "いもうと"
        meaning: "hermana menor"
        example: "妹が学校に行く (いもうとががっこうにいく, mi hermana va a la escuela)"
      - japanese: "祖父"
        reading: "そふ"
        meaning: "abuelo"
        example: "祖父は元気です (そふはげんきです, mi abuelo está bien)"
      - japanese: "祖母"
        reading: "そぼ"
        meaning: "abuela"
        example: "祖母の料理が美味しい (そぼのりょうりがおいしい, la comida de mi abuela es deliciosa)"
      - japanese: "息子"
        reading: "むすこ"
        meaning: "hijo"
        example: "息子が生まれました (むすこがうまれました, nació mi hijo)"
      - japanese: "娘"
        reading: "むすめ"
        meaning: "hija"
        example: "娘が結婚した (むすめがけっこんした, mi hija se casó)"

  - id: weather
    label: "Clima y Tiempo"
    items:
      - japanese: "天気"
        reading: "てんき"
        meaning: "clima"
        example: "今日の天気は？ (きょうのてんきは?, ¿cómo está el clima hoy?)"
      - japanese: "晴れ"
        reading: "はれ"
        meaning: "soleado"
        example: "今日は晴れです (きょうははれです, hoy está soleado)"
      - japanese: "雨"
        reading: "あめ"
        meaning: "lluvia"
        example: "雨が降っている (あめがふっている, está lloviendo)"
      - japanese: "雪"
        reading: "ゆき"
        meaning: "nieve"
        example: "雪が降った (ゆきがふった, nevó)"
      - japanese: "風"
        reading: "かぜ"
        meaning: "viento"
        example: "風が強い (かぜがつよい, el viento es fuerte)"
      - japanese: "暑い"
        reading: "あつい"
        meaning: "calor (clima)"
        example: "今日は暑い (きょうはあつい, hoy hace calor)"
      - japanese: "寒い"
        reading: "さむい"
        meaning: "frío (clima)"
        example: "冬は寒い (ふゆはさむい, en invierno hace frío)"
      - japanese: "暖かい"
        reading: "あたたかい"
        meaning: "cálido"
        example: "春は暖かい (はるはあたたかい, en primavera es cálido)"
      - japanese: "涼しい"
        reading: "すずしい"
        meaning: "fresco"
        example: "秋は涼しい (あきはすずしい, en otoño es fresco)"
      - japanese: "台風"
        reading: "たいふう"
        meaning: "tifón"
        example: "台風が来る (たいふうがくる, viene un tifón)"

  - id: time
    label: "Tiempo y Fechas"
    items:
      - japanese: "今日"
        reading: "きょう"
        meaning: "hoy"
        example: "今日は何曜日？ (きょうはなんようび?, ¿qué día es hoy?)"
      - japanese: "明日"
        reading: "あした"
        meaning: "mañana"
        example: "明日は休み (あしたはやすみ, mañana es descanso)"
      - japanese: "昨日"
        reading: "きのう"
        meaning: "ayer"
        example: "昨日は忙しかった (きのうはいそがしかった, ayer estuve ocupado)"
      - japanese: "今週"
        reading: "こんしゅう"
        meaning: "esta semana"
        example: "今週の予定 (こんしゅうのよてい, planes de esta semana)"
      - japanese: "来週"
        reading: "らいしゅう"
        meaning: "próxima semana"
        example: "来週テストがある (らいしゅうテストがある, hay examen la próxima semana)"
      - japanese: "先週"
        reading: "せんしゅう"
        meaning: "semana pasada"
        example: "先週日本に行った (せんしゅうにほんにいった, fui a Japón la semana pasada)"
      - japanese: "今月"
        reading: "こんげつ"
        meaning: "este mes"
        example: "今月は忙しい (こんげつはいそがしい, este mes estoy ocupado)"
      - japanese: "毎年"
        reading: "まいとし"
        meaning: "cada año"
        example: "毎年旅行する (まいとしりょこうする, viajo cada año)"
      - japanese: "朝"
        reading: "あさ"
        meaning: "mañana (temprano)"
        example: "朝ご飯を食べる (あさごはんをたべる, desayunar)"
      - japanese: "夜"
        reading: "よる"
        meaning: "noche"
        example: "夜勉強する (よるべんきょうする, estudio en la noche)"

  - id: body
    label: "Partes del Cuerpo"
    items:
      - japanese: "頭"
        reading: "あたま"
        meaning: "cabeza"
        example: "頭が痛い (あたまがいたい, me duele la cabeza)"
      - japanese: "髪"
        reading: "かみ"
        meaning: "cabello"
        example: "髪を切る (かみをきる, cortar el cabello)"
      - japanese: "顔"
        reading: "かお"
        meaning: "cara"
        example: "顔を洗う (かおをあらう, lavarse la cara)"
      - japanese: "鼻"
        reading: "はな"
        meaning: "nariz"
        example: "鼻が高い (はながたかい, nariz alta)"
      - japanese: "口"
        reading: "くち"
        meaning: "boca"
        example: "口を開ける (くちをあける, abrir la boca)"
      - japanese: "歯"
        reading: "は"
        meaning: "diente"
        example: "歯を磨く (はをみがく, cepillarse los dientes)"
      - japanese: "舌"
        reading: "した"
        meaning: "lengua"
        example: "舌を出す (したをだす, sacar la lengua)"
      - japanese: "首"
        reading: "くび"
        meaning: "cuello"
        example: "首が痛い (くびがいたい, me duele el cuello)"
      - japanese: "肩"
        reading: "かた"
        meaning: "hombro"
        example: "肩が凝る (かたがこる, tener hombros tensos)"
      - japanese: "背中"
        reading: "せなか"
        meaning: "espalda"
        example: "背中がかゆい (せなかがかゆい, me pica la espalda)"

  - id: greetings
    label: "Saludos y Expresiones"
    items:
      - japanese: "こんにちは"
        reading: "こんにちは"
        meaning: "hola/buenas tardes"
        example: "こんにちは、元気ですか？ (hola, ¿cómo estás?)"
      - japanese: "おはようございます"
        reading: "おはようございます"
        meaning: "buenos días (formal)"
        example: "先生、おはようございます (buenos días, profesor)"
      - japanese: "こんばんは"
        reading: "こんばんは"
        meaning: "buenas noches"
        example: "こんばんは、お疲れ様です (buenas noches, gracias por tu trabajo)"
      - japanese: "さようなら"
        reading: "さようなら"
        meaning: "adiós"
        example: "さようなら、また明日 (adiós, hasta mañana)"
      - japanese: "ありがとう"
        reading: "ありがとう"
        meaning: "gracias"
        example: "ありがとうございます (muchas gracias, formal)"
      - japanese: "すみません"
        reading: "すみません"
        meaning: "disculpe/perdón"
        example: "すみません、駅はどこですか？ (disculpe, ¿dónde está la estación?)"
      - japanese: "お願いします"
        reading: "おねがいします"
        meaning: "por favor"
        example: "コーヒーをお願いします (café, por favor)"
      - japanese: "いただきます"
        reading: "いただきます"
        meaning: "buen provecho (antes de comer)"
        example: "いただきます！(antes de empezar a comer)"
      - japanese: "ごちそうさま"
        reading: "ごちそうさま"
        meaning: "gracias por la comida (después)"
        example: "ごちそうさまでした (después de comer)"
      - japanese: "大丈夫"
        reading: "だいじょうぶ"
        meaning: "está bien, no problema"
        example: "大丈夫ですか？ (だいじょうぶですか?, ¿estás bien?)"

  - id: adjectives_i
    label: "Adjetivos-I"
    items:
      - japanese: "大きい"
        reading: "おおきい"
        meaning: "grande"
        example: "大きい犬 (おおきいいぬ, perro grande)"
      - japanese: "小さい"
        reading: "ちいさい"
        meaning: "pequeño"
        example: "小さい猫 (ちいさいねこ, gato pequeño)"
      - japanese: "新しい"
        reading: "あたらしい"
        meaning: "nuevo"
        example: "新しい車 (あたらしいくるま, coche nuevo)"
      - japanese: "古い"
        reading: "ふるい"
        meaning: "viejo"
        example: "古い本 (ふるいほん, libro viejo)"
      - japanese: "早い"
        reading: "はやい"
        meaning: "rápido/temprano"
        example: "電車が早い (でんしゃがはやい, el tren es rápido)"
      - japanese: "遅い"
        reading: "おそい"
        meaning: "lento/tarde"
        example: "時計が遅い (とけいがおそい, el reloj está atrasado)"
      - japanese: "美味しい"
        reading: "おいしい"
        meaning: "delicioso"
        example: "この料理は美味しい (このりょうりはおいしい, esta comida es deliciosa)"
      - japanese: "楽しい"
        reading: "たのしい"
        meaning: "divertido"
        example: "旅行は楽しい (りょこうはたのしい, el viaje es divertido)"
      - japanese: "難しい"
        reading: "むずかしい"
        meaning: "difícil"
        example: "日本語は難しい (にほんごはむずかしい, el japonés es difícil)"
      - japanese: "易しい"
        reading: "やさしい"
        meaning: "fácil"
        example: "この問題は易しい (このもんだいはやさしい, este problema es fácil)"
